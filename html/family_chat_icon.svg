<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BC8F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A9ED4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EAF6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E86D4A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bubble1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A426;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bubble2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6CF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bubble3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB3C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E87BAC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1A6B99" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景：角丸正方形 -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- 背景の雲デコレーション -->
  <ellipse cx="160" cy="200" rx="90" ry="55" fill="white" opacity="0.18"/>
  <ellipse cx="220" cy="185" rx="65" ry="50" fill="white" opacity="0.18"/>
  <ellipse cx="120" cy="215" rx="55" ry="40" fill="white" opacity="0.18"/>

  <ellipse cx="900" cy="150" rx="80" ry="48" fill="white" opacity="0.15"/>
  <ellipse cx="950" cy="138" rx="55" ry="44" fill="white" opacity="0.15"/>
  <ellipse cx="860" cy="162" rx="48" ry="35" fill="white" opacity="0.15"/>

  <!-- ★ 家の本体（白い四角） -->
  <rect x="280" y="480" width="464" height="340" rx="30" ry="30"
        fill="url(#houseGrad)" filter="url(#shadow)"/>

  <!-- 家の屋根（三角） -->
  <polygon points="512,200 210,490 814,490"
           fill="url(#roofGrad)" filter="url(#shadow)"/>
  <!-- 屋根のハイライト -->
  <polygon points="512,210 225,488 800,488"
           fill="none" stroke="white" stroke-width="6" stroke-opacity="0.3"/>

  <!-- 煙突 -->
  <rect x="620" y="235" width="52" height="110" rx="10" ry="10"
        fill="#D4694F"/>
  <rect x="610" y="225" width="72" height="28" rx="8" ry="8"
        fill="#C85A40"/>

  <!-- 煙 -->
  <ellipse cx="646" cy="200" rx="18" ry="22" fill="white" opacity="0.6"/>
  <ellipse cx="662" cy="175" rx="14" ry="18" fill="white" opacity="0.45"/>
  <ellipse cx="650" cy="152" rx="11" ry="14" fill="white" opacity="0.3"/>

  <!-- ドア -->
  <rect x="448" y="660" width="128" height="160" rx="20" ry="20"
        fill="#A8D8EA"/>
  <rect x="448" y="660" width="128" height="160" rx="20" ry="20"
        fill="none" stroke="#7EC8E3" stroke-width="4"/>
  <!-- ドアのノブ -->
  <circle cx="555" cy="748" r="10" fill="#FFD166"/>
  <!-- ドアの装飾線 -->
  <line x1="512" y1="672" x2="512" y2="808" stroke="#7EC8E3" stroke-width="3" opacity="0.6"/>

  <!-- 窓（左） -->
  <rect x="318" y="560" width="120" height="100" rx="16" ry="16"
        fill="#A8D8EA"/>
  <rect x="318" y="560" width="120" height="100" rx="16" ry="16"
        fill="none" stroke="#7EC8E3" stroke-width="4"/>
  <line x1="378" y1="564" x2="378" y2="656" stroke="#7EC8E3" stroke-width="3" opacity="0.6"/>
  <line x1="322" y1="610" x2="434" y2="610" stroke="#7EC8E3" stroke-width="3" opacity="0.6"/>
  <!-- 窓の輝き -->
  <ellipse cx="340" cy="578" rx="14" ry="10" fill="white" opacity="0.5" transform="rotate(-20,340,578)"/>

  <!-- 窓（右） -->
  <rect x="586" y="560" width="120" height="100" rx="16" ry="16"
        fill="#A8D8EA"/>
  <rect x="586" y="560" width="120" height="100" rx="16" ry="16"
        fill="none" stroke="#7EC8E3" stroke-width="4"/>
  <line x1="646" y1="564" x2="646" y2="656" stroke="#7EC8E3" stroke-width="3" opacity="0.6"/>
  <line x1="590" y1="610" x2="702" y2="610" stroke="#7EC8E3" stroke-width="3" opacity="0.6"/>
  <!-- 窓の輝き -->
  <ellipse cx="608" cy="578" rx="14" ry="10" fill="white" opacity="0.5" transform="rotate(-20,608,578)"/>

  <!-- ★ 吹き出し（右上：黄色） -->
  <rect x="640" y="100" width="280" height="120" rx="36" ry="36"
        fill="url(#bubble1Grad)" filter="url(#softShadow)"/>
  <!-- 吹き出しの尻尾 -->
  <polygon points="680,218 640,270 730,220" fill="#FFD166"/>
  <!-- 吹き出しの中身（ハートと星） -->
  <text x="750" y="175" font-size="68" text-anchor="middle" dominant-baseline="central">💬</text>

  <!-- ★ 吹き出し（左上：緑） -->
  <rect x="104" y="130" width="240" height="110" rx="32" ry="32"
        fill="url(#bubble2Grad)" filter="url(#softShadow)"/>
  <!-- 吹き出しの尻尾 -->
  <polygon points="340,238 380,285 300,242" fill="#4ECDC4"/>
  <!-- 吹き出しの中身 -->
  <text x="224" y="190" font-size="62" text-anchor="middle" dominant-baseline="central">🏠</text>

  <!-- ★ 吹き出し（右下：ピンク） -->
  <rect x="660" y="760" width="220" height="100" rx="28" ry="28"
        fill="url(#bubble3Grad)" filter="url(#softShadow)"/>
  <!-- 吹き出しの尻尾 -->
  <polygon points="680,762 640,720 730,760" fill="#FFB3C6"/>
  <!-- 吹き出しの中身 -->
  <text x="770" y="812" font-size="58" text-anchor="middle" dominant-baseline="central">❤️</text>

  <!-- ★ 星のデコレーション -->
  <text x="165" y="390" font-size="52" text-anchor="middle" dominant-baseline="central" opacity="0.85">⭐</text>
  <text x="875" y="420" font-size="44" text-anchor="middle" dominant-baseline="central" opacity="0.8">✨</text>
  <text x="900" y="680" font-size="38" text-anchor="middle" dominant-baseline="central" opacity="0.75">🌟</text>
  <text x="140" y="750" font-size="36" text-anchor="middle" dominant-baseline="central" opacity="0.7">💫</text>

  <!-- 地面の草 -->
  <ellipse cx="512" cy="835" rx="260" ry="18" fill="#4DB87A" opacity="0.35"/>
</svg>
